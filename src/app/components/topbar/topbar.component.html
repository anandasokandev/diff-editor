<header class="topbar">
  <!-- Left: Logo + Actions -->
  <div class="left-area">
    <div class="logo-section">
      <div class="logo" (click)="newDesign.emit()" title="Create new design">
        <span class="logo-mark">✦</span>
        <span class="logo-text">Craftly</span>
      </div>
      <div class="breadcrumb">
        <span class="template-name" title="{{ cs.templateName() }}">{{ cs.templateName() }}</span>
        <span class="canvas-dims">{{ cs.canvasWidth() }}×{{ cs.canvasHeight() }}px</span>
      </div>
    </div>

    <button class="btn primary-btn" (click)="newDesign.emit()" title="Create new design">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <span>New</span>
    </button>
  </div>

  <!-- Center: Editing Tools -->
  <div class="center-area">
    <!-- Undo/Redo Group -->
    <div class="toolbar-group">
      <button class="tb-btn" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7v6h6" />
          <path d="M3 13C5.2 8.6 9.3 6 14 6c4.4 0 8 3.6 8 8s-3.6 8-8 8" />
        </svg>
      </button>
      <button class="tb-btn" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 7v6h-6" />
          <path d="M21 13C18.8 8.6 14.7 6 10 6c-4.4 0-8 3.6-8 8s3.6 8 8 8" />
        </svg>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Zoom Controls -->
    <div class="zoom-cluster">
      <button class="tb-btn" (click)="cs.zoomOut()" title="Zoom out (Ctrl+-)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
      <button class="zoom-pct" (click)="cs.zoomReset()" title="Reset zoom to 100%">{{ zoomPct }}%</button>
      <button class="tb-btn" (click)="cs.zoomIn()" title="Zoom in (Ctrl++)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Right: Content Tools + Download + Theme Toggle -->
  <div class="right-area">
    <button class="btn ghost-btn" (click)="openAiModal.emit()" title="Generate with AI">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" />
      </svg>
      <span>AI</span>
    </button>

    <button class="btn ghost-btn" (click)="openImgModal.emit()" title="Insert image">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
      <span>Image</span>
    </button>

    <button class="btn reset-btn" (click)="resetCanvas()" [disabled]="cs.elements().length === 0"
      title="Reset canvas — clear all elements">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
      </svg>
      <span>Reset</span>
    </button>

    <div class="toolbar-divider"></div>

    <!-- Export Button -->
    <button class="btn export-btn" [class.loading]="downloading" (click)="download()" [disabled]="downloading"
      title="Export design as PNG">
      @if (downloading) {
      <span class="spinner"></span>
      <span>Exporting…</span>
      }
      @if (!downloading) {
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M8 17H5c-1 0-2-1-2-2V5c0-1 1-2 2-2h10c1 0 2 1 2 2v12c0 1-1 2-2 2h-3m0 0v3m0-3l2-2m-2 2l-2-2" />
      </svg>
      <span>Export</span>
      }
    </button>

    <!-- Theme Toggle -->
    <button class="btn theme-toggle-btn" (click)="themeService.toggleTheme()"
      [title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (themeService.isDark()) {
      <!-- Moon icon for dark mode -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
      } @else {
      <!-- Sun icon for light mode -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      }
    </button>

    <input #fileInput type="file" accept="image/*" style="display:none" (change)="onFileChange($event)" />
  </div>
</header>
